// ============================
// DEEPSEEK QUESTION GENERATOR via secure proxy
// ============================
async function generateQuestionsWithDeepSeek(skill, langCode) {
  const prompt = langCode === 'ar'
    ? `أنشئ اختبارًا من 5 أسئلة متعددة الاختيار لقياس مهارة "${skill}". يجب أن تكون الأسئلة باللغة العربية. أجب فقط بـ JSON بهذا الشكل الدقيق بدون أي نص إضافي: {"questions":[{"q":"السؤال","options":["خيار1","خيار2","خيار3","خيار4"],"correct":0}]} حيث correct هو رقم الفهرس (0-3) للإجابة الصحيحة.`
    : `Create a 5-question multiple-choice test for the skill "${skill}". Respond only with a JSON object in this exact format, no extra text: {"questions":[{"q":"Question text","options":["Option1","Option2","Option3","Option4"],"correct":0}]} where correct is the index (0-3) of the right answer.`;

  // Call the Vercel serverless function (must be deployed at /api/deepseek)
  const response = await fetch('/api/deepseek', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
