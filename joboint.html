// ============================
// DEEPSEEK QUESTION GENERATOR
// ============================
async function generateQuestionsWithDeepSeek(skill, langCode) {
  const prompt = langCode === 'ar'
    ? `أنشئ اختبارًا من 5 أسئلة متعددة الاختيار لقياس مهارة "${skill}". يجب أن تكون الأسئلة باللغة العربية. أجب فقط بـ JSON بهذا الشكل الدقيق بدون أي نص إضافي: {"questions":[{"q":"السؤال","options":["خيار1","خيار2","خيار3","خيار4"],"correct":0}]} حيث correct هو رقم الفهرس (0-3) للإجابة الصحيحة.`
    : `Create a 5-question multiple-choice test for the skill "${skill}". Respond only with a JSON object in this exact format, no extra text: {"questions":[{"q":"Question text","options":["Option1","Option2","Option3","Option4"],"correct":0}]} where correct is the index (0-3) of the right answer.`;

  const response = await fetch(DEEPSEEK_API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
    },
    body: JSON.stringify({
      model: 'deepseek-chat',
      messages: [{ role: 'user', content: prompt }],
      temperature: 0.7,
      max_tokens: 1500
    })
  });
  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`DeepSeek API error: ${response.status} ${errText}`);
  }
  const data = await response.json();
  const content = data.choices[0].message.content;
  let cleaned = content.replace(/```json\s*|\s*```/g, '').trim();
  const parsed = JSON.parse(cleaned);
  if (!parsed.questions || !Array.isArray(parsed.questions)) throw new Error('Invalid response format');
  return parsed.questions;
}

function AuthModal({ onClose, defaultTab }) {
  const lang = React.useContext(LangCtx);
  const t = T[lang];
  const [tab, setTab] = React.useState(defaultTab || 'login');
  const [form, setForm] = React.useState({ email:'', password:'', fullName:'', role:'candidate' });
  const [loading, setLoading] = React.useState(false);
  const [err, setErr] = React.useState('');

  const handleLogin = async () => {
    setLoading(true); setErr('');
    const { error } = await sb.auth.signInWithPassword({ email: form.email, password: form.password });
    setLoading(false);
    if (error) setErr(error.message);
    else onClose();
  };

  const handleRegister = async () => {
    if (!form.email || !form.password || !form.fullName) { setErr(t.fillFields); return; }
    setLoading(true); setErr('');
    const { data, error } = await sb.auth.signUp({
      email: form.email,
      password: form.password,
      options: { data: { full_name: form.fullName, role: form.role } }
    });
    if (error) { setErr(error.message); setLoading(false); return; }
    if (data.user) {
      await sb.from('profiles').update({ role: form.role, full_name: form.fullName }).eq('id', data.user.id);
      if (form.role === 'employer') {
        await sb.from('employers').insert({ user_id: data.user.id, company_name: form.fullName });
      } else {
        await sb.from('candidates').insert({ user_id: data.user.id });
      }
    }
    setLoading(false);
    if (!error) onClose();
  };

  const f = (k) => (v) => setForm(p => ({ ...p, [k]: v }));

  return h(Modal, { onClose },
    h('div', { className: 'modal-title' }, tab === 'login' ? t.login : t.register),
    h('div', { className: 'modal-subtitle' }, t.brand),
    h('div', { className: 'tabs', style: { marginBottom: 20 } },
      h('button', { className: `tab ${tab==='login' ? 'active' : ''}`, onClick: () => setTab('login') }, t.login),
      h('button', { className: `tab ${tab==='register' ? 'active' : ''}`, onClick: () => setTab('register') }, t.register)
    ),
    err && h('div', { className: 'alert alert-error' }, err),
    tab === 'register' && h(React.Fragment, null,
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, t.fullName),
        h('input', { className: 'form-input', value: form.fullName, onChange: e => f('fullName')(e.target.value) })
      ),
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, t.role),
        h('select', { className: 'form-select', value: form.role, onChange: e => f('role')(e.target.value) },
          h('option', { value: 'candidate' }, t.candidate),
          h('option', { value: 'employer' }, t.employer)
        )
      )
    ),
    h('div', { className: 'form-group' },
      h('label', { className: 'form-label' }, t.email),
      h('input', { className: 'form-input', type: 'email', value: form.email, onChange: e => f('email')(e.target.value) })
    ),
    h('div', { className: 'form-group' },
      h('label', { className: 'form-label' }, t.password),
      h('input', { className: 'form-input', type: 'password', value: form.password, onChange: e => f('password')(e.target.value),
        onKeyDown: e => e.key==='Enter' && (tab==='login' ? handleLogin() : handleRegister()) })

// ============================
// ASSESSMENT RUNNER (DeepSeek)
// ============================
function AssessmentRunner({ candidateId, onDone, lang }) {
  const t = T[lang];
  const [skill, setSkill] = React.useState('');
  const [questions, setQuestions] = React.useState(null);
  const [answers, setAnswers] = React.useState({});
  const [current, setCurrent] = React.useState(0);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [result, setResult] = React.useState(null);

  const generateAssessment = async () => {
    if (!skill.trim()) return;
    setLoading(true);
    setError('');
    try {
      const generated = await generateQuestionsWithDeepSeek(skill, lang);
      setQuestions(generated);
      setAnswers({});
      setCurrent(0);
      setResult(null);
    } catch (err) {
      console.error(err);
      setError(err.message || t.error);
    } finally {
      setLoading(false);
    }
  };

  const submitAssessment = async () => {
    const correct = questions.filter((q,i)=>answers[i]===q.correct).length;
    const score = Math.round((correct/questions.length)*100);
    const passed = score >= 60;
    setResult({ score, passed, correct, total: questions.length });
    await sb.from('assessments').insert({
      candidate_id: candidateId,
      skill,
      questions,
      answers: Object.values(answers),
      score,
      passed
    });
    if (onDone) onDone();
  };

  if (result) return h('div', { style: { textAlign:'center', padding:'20px 0' } },
    h('div', { style: { fontSize:64, marginBottom:8 } }, result.passed ? '🏆' : '📚'),
    h('div', { style: { fontSize:48, fontWeight:900, fontFamily:'Space Mono', color: result.passed ? 'var(--accent3)' : 'var(--accent2)' } }, result.score + '%'),
    h('div', { style: { marginTop:8 } }, h('span', { className: `badge ${result.passed ? 'badge-green' : 'badge-red'}`, style: { fontSize:16, padding:'6px 20px' } }, result.passed ? t.passed : t.failed)),
    h('p', { style: { color:'var(--text2)', marginTop:16 } }, result.correct + '/' + result.total + ' ' + (lang==='ar' ? 'إجابات صحيحة' : 'correct answers')),
    h('button', { className: 'btn btn-outline', style: { marginTop:24 }, onClick: () => { setQuestions(null); setSkill(''); setResult(null); setError(''); } }, lang==='ar' ? 'اختبار جديد' : 'New Assessment')
  );

  if (!questions) return h('div', null,
    error && h('div', { className: 'alert alert-error' }, error),
    h('div', { className: 'form-group' },
      h('label', { className: 'form-label' }, t.skillName),
      h('input', { className: 'form-input', value: skill, onChange: e => setSkill(e.target.value),
        placeholder: lang==='ar' ? 'مثال: JavaScript، تحليل البيانات' : 'e.g. JavaScript, Data Analysis',
        onKeyDown: e => e.key==='Enter' && generateAssessment() })
    ),
    h('button', { className: 'btn btn-primary', style: { width:'100%' }, disabled: loading || !skill.trim(), onClick: generateAssessment },
      loading ? t.generating : t.generate)
  );

  const q = questions[current];
  return h('div', null,
    h('div', { style: { display:'flex', justifyContent:'space-between', marginBottom:16, alignItems:'center' } },
      h('span', { style: { color:'var(--text2)', fontSize:14 } }, t.question + ' ' + (current+1) + ' ' + t.of + ' ' + questions.length),
      h('span', { className: 'badge badge-purple' }, skill)
    ),
    h('div', { className: 'progress-bar', style: { marginBottom:20 } }, h('div', { className: 'progress-fill', style: { width: `${((current+1)/questions.length)*100}%` } })),
    h('div', { className: 'question-card' },
      h('div', { className: 'question-text' }, q.q),
      q.options.map((opt,i) => {
        let cls = 'option-btn';
        if (answers[current] !== undefined) {
          if (i === q.correct) cls += ' correct';
          else if (answers[current]===i) cls += ' wrong';
        } else if (answers[current]===i) cls += ' selected';
        return h('button', { key: i, className: cls, onClick: () => { if(answers[current]===undefined) setAnswers(p=>({...p,[current]:i})); } }, opt);
      })
    ),
    h('div', { style: { display:'flex', gap:10, justifyContent:'space-between' } },
      h('button', { className: 'btn btn-outline', disabled: current===0, onClick: () => setCurrent(p=>p-1) }, t.prev),
      current < questions.length-1
        ? h('button', { className: 'btn btn-primary', disabled: answers[current]===undefined, onClick: () => setCurrent(p=>p+1) }, t.next)
        : h('button', { className: 'btn btn-success', disabled: Object.keys(answers).length < questions.length, onClick: submitAssessment }, t.finish)
    )
  );
}

function App() {
  const [lang, setLang] = React.useState('ar');
  const [user, setUser] = React.useState(null);
  const [profile, setProfile] = React.useState(null);
  const [candidate, setCandidate] = React.useState(null);
  const [employer, setEmployer] = React.useState(null);
  const [page, setPage] = React.useState('home');
  const [authModal, setAuthModal] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const [stats, setStats] = React.useState({ candidates:0, jobs:0, assessments:0 });
  const t = T[lang];

  React.useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => { if (session?.user) { setUser(session.user); loadProfile(session.user.id); } });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => { if (session?.user) { setUser(session.user); loadProfile(session.user.id); } else { setUser(null); setProfile(null); setCandidate(null); setEmployer(null); setPage('home'); } });
    loadStats();

    setProfile(prof);

    setPage('dashboard');
  };
